<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1C1C1C;
      --surface: #2A2A2A;
      --border:  #3D3D3D;
      --text:    #EBEBEB;
      --muted:   #666;
      --accent:  #F0B429;
      --green:   #6AAA64;
      --yellow:  #B59F3B;
      --cell:    72px;
      --gap:     6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--accent);
      line-height: 1;
    }

    .puzzle-num {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 28px 16px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, var(--cell));
      grid-template-rows:    repeat(4, var(--cell));
      gap: var(--gap);
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.12s;
    }

    /* Pre-revealed cross cells — muted, non-interactive */
    .cell.cross {
      background: #222;
      border-color: #383838;
      color: var(--muted);
      cursor: default;
    }

    /* Player-correct cells */
    .cell.correct {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      cursor: default;
    }

    /* Selected empty cell */
    .cell.selected {
      border-color: var(--accent);
      background: #2F2C22;
    }

    /* ── Letter picker ── */
    .picker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #212121;
      border-top: 1px solid var(--border);
      padding: 10px 8px 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .picker[hidden] { display: none; }

    .picker-row {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .pk-key {
      width: 36px;
      height: 46px;
      border: none;
      border-radius: 4px;
      background: #363636;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.08s;
    }

    .pk-key:active { background: #555; }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: 480px;
      padding: 14px 16px 80px; /* bottom pad so footer clears the picker */
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    footer span {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    @media (max-width: 360px) {
      :root { --cell: 60px; }
      h1    { font-size: 1.8rem; }
      .pk-key { width: 30px; height: 42px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>NOON</h1>
    <p class="puzzle-num">Puzzle #1</p>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <span>NOON · Daily Word Square</span>
  </footer>

  <section class="picker" id="picker" hidden>
    <div class="picker-row">
      <button class="pk-key" data-letter="Q">Q</button>
      <button class="pk-key" data-letter="W">W</button>
      <button class="pk-key" data-letter="E">E</button>
      <button class="pk-key" data-letter="R">R</button>
      <button class="pk-key" data-letter="T">T</button>
      <button class="pk-key" data-letter="Y">Y</button>
      <button class="pk-key" data-letter="U">U</button>
      <button class="pk-key" data-letter="I">I</button>
      <button class="pk-key" data-letter="O">O</button>
      <button class="pk-key" data-letter="P">P</button>
    </div>
    <div class="picker-row">
      <button class="pk-key" data-letter="A">A</button>
      <button class="pk-key" data-letter="S">S</button>
      <button class="pk-key" data-letter="D">D</button>
      <button class="pk-key" data-letter="F">F</button>
      <button class="pk-key" data-letter="G">G</button>
      <button class="pk-key" data-letter="H">H</button>
      <button class="pk-key" data-letter="J">J</button>
      <button class="pk-key" data-letter="K">K</button>
      <button class="pk-key" data-letter="L">L</button>
    </div>
    <div class="picker-row">
      <button class="pk-key" data-letter="Z">Z</button>
      <button class="pk-key" data-letter="X">X</button>
      <button class="pk-key" data-letter="C">C</button>
      <button class="pk-key" data-letter="V">V</button>
      <button class="pk-key" data-letter="B">B</button>
      <button class="pk-key" data-letter="N">N</button>
      <button class="pk-key" data-letter="M">M</button>
    </div>
  </section>

  <script>
    /*
      Puzzle #1 word square:
        C A R D
        A R E A   ← row 1 (across) + col 1 (down) = pre-revealed cross
        R E A D
        D A D S
    */
    const SOLUTION = [
      ['C','A','R','D'],
      ['A','R','E','A'],
      ['R','E','A','D'],
      ['D','A','D','S']
    ];

    // A cell is part of the cross if it's in row 1 OR col 1
    const isCross = (r, c) => r === 1 || c === 1;

    // ── Build grid ──
    const gridEl = document.getElementById('grid');
    let selected = null; // { r, c, el }

    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const el = document.createElement('div');
        el.className = 'cell';
        el.id = `cell-${r}-${c}`;

        if (isCross(r, c)) {
          el.classList.add('cross');
          el.textContent = SOLUTION[r][c];
        } else {
          el.addEventListener('click', () => handleCellClick(r, c, el));
        }

        gridEl.appendChild(el);
      }
    }

    const pickerEl = document.getElementById('picker');

    function handleCellClick(r, c, el) {
      if (el.classList.contains('correct')) return;

      if (selected && selected.r === r && selected.c === c) {
        deselect();
        return;
      }

      if (selected) selected.el.classList.remove('selected');
      selected = { r, c, el };
      el.classList.add('selected');
      pickerEl.hidden = false;
    }

    function deselect() {
      if (selected) selected.el.classList.remove('selected');
      selected = null;
      pickerEl.hidden = true;
    }

    function placeLetter(letter) {
      if (!selected) return;
      const { r, c, el } = selected;
      el.textContent = letter;
      deselect();
      // validation will go here in Part 3
    }

    // Picker tap
    pickerEl.addEventListener('click', e => {
      const key = e.target.closest('[data-letter]');
      if (key) placeLetter(key.dataset.letter);
    });

    // Physical keyboard
    document.addEventListener('keydown', e => {
      if (!selected) return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (/^[a-zA-Z]$/.test(e.key)) placeLetter(e.key.toUpperCase());
      if (e.key === 'Escape') deselect();
    });
  </script>

</body>
</html>
