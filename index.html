<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1C1C1C;
      --surface:      #2A2A2A;
      --border:       #3D3D3D;
      --text:         #EBEBEB;
      --text-muted:   #777;
      --accent:       #F0B429;
      --cell-size:    68px;
      --gap:          6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 480px;
      padding: 24px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--accent);
      line-height: 1;
    }

    .puzzle-num {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .tagline {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 28px 16px;
    }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .row {
      display: flex;
      gap: var(--gap);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text);
    }

    .cell.revealed {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Active row — cells being typed into */
    .row.active .cell:not(.revealed) {
      border-color: #666;
    }

    /* ── Feedback colors ── */
    .cell.green  { background: #6AAA64; border-color: #6AAA64; color: #fff; }
    .cell.yellow { background: #B59F3B; border-color: #B59F3B; color: #fff; }
    .cell.gray   { background: #4A4A4A; border-color: #4A4A4A; color: #fff; }
    .cell.reveal { background: #2F2F2F; border-color: #444; color: #666; }

    /* ── Clear button (shown after a wrong guess) ── */
    .clear-btn {
      padding: 8px 22px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.15s, color 0.15s;
    }
    .clear-btn:hover  { border-color: #666; color: var(--text); }
    .clear-btn:active { opacity: 0.6; }

    /* ── Share button ── */
    .share-btn {
      margin-top: 14px;
      padding: 10px 28px;
      background: var(--accent);
      color: #1C1C1C;
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
      touch-action: manipulation;
    }
    .share-btn:active { opacity: 0.75; }

    /* ── Result panel ── */
    .result {
      text-align: center;
    }
    .result-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .result-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .result[data-outcome="win"]  .result-title { color: #6AAA64; }
    .result[data-outcome="lose"] .result-title { color: #E05A5A; }

    /* ── Guess counter ── */
    .guess-counter {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── Countdown ── */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .countdown-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .countdown-timer {
      font-size: 1.7rem;
      color: var(--text);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: 480px;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    footer span {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── Header countdown ── */
    .header-countdown {
      font-size: 0.66rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }
    .header-countdown .countdown-time {
      font-variant-numeric: tabular-nums;
    }

    /* ── Result countdown ── */
    .result-countdown {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .result-next-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .result-next-time {
      font-size: 1.9rem;
      color: var(--text);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Typing pop ── */
    @keyframes pop {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }
    .cell.pop { animation: pop 0.1s ease; }

    /* ── Tile flip reveal ── */
    .row { perspective: 300px; }
    @keyframes flip-reveal {
      0%   { transform: rotateX(0deg); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0deg); }
    }
    .cell.flipping { animation: flip-reveal 0.5s ease; }

    /* ── Keyboard letter states ── */
    .kb-key.green  { background: #6AAA64; color: #fff; }
    .kb-key.yellow { background: #B59F3B; color: #fff; }
    .kb-key.gray   { background: #252525; color: #444; }

    /* ── Responsive height ── */
    @media (max-height: 680px) {
      main { gap: 16px; padding: 16px; }
      .keyboard { padding-bottom: 12px; }
    }

    /* ── Shake animation ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      40%       { transform: translateX(7px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .row.shake { animation: shake 0.35s ease; }

    /* ── Toast message ── */
    .message {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .message.visible { opacity: 1; }

    /* ── On-screen Keyboard ── */
    .keyboard {
      width: 100%;
      max-width: 480px;
      padding: 10px 8px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px solid var(--border);
    }

    .kb-row {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .kb-spacer { flex: 0.5; }

    .kb-key {
      flex: 1;
      height: 44px;
      min-width: 0;
      border: none;
      border-radius: 4px;
      background: #333;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.08s;
    }

    .kb-key:active { background: #555; }

    .kb-wide {
      flex: 1.5;
      font-size: 1rem;
    }

    /* ── Responsive ── */
    @media (max-width: 360px) {
      :root {
        --cell-size: 58px;
        --gap: 5px;
      }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="message" id="message"></div>

  <header>
    <h1>NOON</h1>
    <p class="puzzle-num">Puzzle #1</p>
    <p class="tagline">One square. Once a day. Everyone.</p>
    <p class="header-countdown">Next NOON in <span class="countdown-time">--:--:--</span></p>
  </header>

  <main>

    <!--
      Puzzle #1 word square:
        C A R D
        A R E A   ← revealed (most common word)
        R E A D
        D A D S
      Rows = Columns (true word square)
    -->
    <div class="grid" id="grid">

      <!-- Row 0: CARD — to be guessed -->
      <div class="row" id="row-0">
        <div class="cell" id="r0c0"></div>
        <div class="cell" id="r0c1"></div>
        <div class="cell" id="r0c2"></div>
        <div class="cell" id="r0c3"></div>
      </div>

      <!-- Row 1: AREA — pre-revealed -->
      <div class="row" id="row-1">
        <div class="cell revealed" id="r1c0">A</div>
        <div class="cell revealed" id="r1c1">R</div>
        <div class="cell revealed" id="r1c2">E</div>
        <div class="cell revealed" id="r1c3">A</div>
      </div>

      <!-- Row 2: READ — to be guessed -->
      <div class="row" id="row-2">
        <div class="cell" id="r2c0"></div>
        <div class="cell" id="r2c1"></div>
        <div class="cell" id="r2c2"></div>
        <div class="cell" id="r2c3"></div>
      </div>

      <!-- Row 3: DADS — to be guessed -->
      <div class="row" id="row-3">
        <div class="cell" id="r3c0"></div>
        <div class="cell" id="r3c1"></div>
        <div class="cell" id="r3c2"></div>
        <div class="cell" id="r3c3"></div>
      </div>

    </div>

    <div class="guess-counter" id="guess-counter">GUESS 1 OF 5</div>
    <button class="clear-btn" id="clear-btn" hidden>Clear row ↩</button>

    <div class="result" id="result" hidden>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub"   id="result-sub"></div>
      <button class="share-btn" id="share-btn">Share result</button>
      <div class="result-countdown">
        <div class="result-next-label">Next NOON in</div>
        <div class="result-next-time countdown-time">--:--:--</div>
      </div>
    </div>

  </main>

  <section class="keyboard" id="keyboard">
    <div class="kb-row">
      <button class="kb-key" data-key="Q">Q</button>
      <button class="kb-key" data-key="W">W</button>
      <button class="kb-key" data-key="E">E</button>
      <button class="kb-key" data-key="R">R</button>
      <button class="kb-key" data-key="T">T</button>
      <button class="kb-key" data-key="Y">Y</button>
      <button class="kb-key" data-key="U">U</button>
      <button class="kb-key" data-key="I">I</button>
      <button class="kb-key" data-key="O">O</button>
      <button class="kb-key" data-key="P">P</button>
    </div>
    <div class="kb-row">
      <div class="kb-spacer"></div>
      <button class="kb-key" data-key="A">A</button>
      <button class="kb-key" data-key="S">S</button>
      <button class="kb-key" data-key="D">D</button>
      <button class="kb-key" data-key="F">F</button>
      <button class="kb-key" data-key="G">G</button>
      <button class="kb-key" data-key="H">H</button>
      <button class="kb-key" data-key="J">J</button>
      <button class="kb-key" data-key="K">K</button>
      <button class="kb-key" data-key="L">L</button>
      <div class="kb-spacer"></div>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-wide" data-key="Enter">↵</button>
      <button class="kb-key" data-key="Z">Z</button>
      <button class="kb-key" data-key="X">X</button>
      <button class="kb-key" data-key="C">C</button>
      <button class="kb-key" data-key="V">V</button>
      <button class="kb-key" data-key="B">B</button>
      <button class="kb-key" data-key="N">N</button>
      <button class="kb-key" data-key="M">M</button>
      <button class="kb-key kb-wide" data-key="Backspace">⌫</button>
    </div>
  </section>

  <footer>
    <span>NOON · Daily Word Square</span>
  </footer>

    // ── Game State ──
    const PUZZLE = {
      solution:      ['CARD', 'AREA', 'READ', 'DADS'],
      revealedRow:   1,            // row index that is pre-filled
      guessableRows: [0, 2, 3]    // row indices filled by player, top to bottom
    };

    // Guarantee: solution words are always valid guesses
    PUZZLE.solution.forEach(w => WORDS.add(w));

    const MAX_GUESSES = 5;
    let guessIndex  = 0;
    let guessRowPtr = 0;
    let currentCol  = 0;
    let gameOver    = false;
    let submitting  = false;  // true while flip animation is running

    function activeRowNum() {
      return PUZZLE.guessableRows[guessRowPtr];
    }

    function markActiveRow() {
      document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
      if (guessRowPtr < PUZZLE.guessableRows.length) {
        document.getElementById('row-' + activeRowNum()).classList.add('active');
      }
    }

    function handleKey(key) {
      if (gameOver || submitting) return;
      if (guessRowPtr >= PUZZLE.guessableRows.length) return;
      if (guessIndex >= MAX_GUESSES) return;

      const row = activeRowNum();

      if (/^[a-zA-Z]$/.test(key)) {
        // Skip past any locked green cells at cursor position
        while (currentCol < 4 && document.getElementById('r' + row + 'c' + currentCol).classList.contains('green')) currentCol++;
        if (currentCol < 4) {
          const cell = document.getElementById('r' + row + 'c' + currentCol);
          cell.textContent = key.toUpperCase();
          cell.classList.remove('pop');
          void cell.offsetWidth;
          cell.classList.add('pop');
          cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
          currentCol++;
          // Advance past any green cells that follow
          while (currentCol < 4 && document.getElementById('r' + row + 'c' + currentCol).classList.contains('green')) currentCol++;
        }
      } else if (key === 'Backspace') {
        // Retreat past locked green cells to find a clearable cell
        let col = currentCol - 1;
        while (col >= 0 && document.getElementById('r' + row + 'c' + col).classList.contains('green')) col--;
        if (col >= 0) {
          document.getElementById('r' + row + 'c' + col).textContent = '';
          currentCol = col;
        }
      } else if (key === 'Enter') {
        handleEnter();
      }
    }

    function handleEnter() {
      if (guessRowPtr >= PUZZLE.guessableRows.length) return;
      if (guessIndex >= MAX_GUESSES) return;

      const row = activeRowNum();
      const allFilled = [0,1,2,3].every(c => document.getElementById('r' + row + 'c' + c).textContent !== '');
      if (!allFilled) { showMessage('Not enough letters'); return; }
      const word = [0,1,2,3].map(c =>
        document.getElementById('r' + row + 'c' + c).textContent
      ).join('');

      if (!WORDS.has(word)) {
        showMessage('Not a word');
        shakeRow(row);
        return;
      }

      submitting = true;
      guessIndex++;
      currentCol = 0;
      updateGuessCounter();

      const isCorrect = word === PUZZLE.solution[row];

      if (isCorrect) {
        // Row solved — keep colors, advance to next row
        applyFeedback(row, word, () => {
          guessRowPtr++;
          resetKeyboardColors();
          markActiveRow();
          checkGameEnd();
          submitting = false;
        });
      } else {
        // Wrong — show feedback, then surface the Clear button
        applyFeedback(row, word, () => {
          if (guessIndex >= MAX_GUESSES) {
            checkGameEnd();
            submitting = false;
          } else {
            document.getElementById('clear-btn').hidden = false;
            // submitting stays true — blocks input until player clears
          }
        });
      }
    }

    function computeFeedback(guess, solution, allLetters) {
      const result = [];
      const sol = solution.split('');
      const gss = guess.split('');
      for (let i = 0; i < 4; i++) {
        if (gss[i] === sol[i])            result.push('green');
        else if (allLetters.has(gss[i]))  result.push('yellow');
        else                               result.push('gray');
      }
      return result;
    }

    const letterStates = {};
    const COLOR_RANK   = { green: 3, yellow: 2, gray: 1 };

    function applyFeedback(rowNum, word, onComplete) {
      const allLetters = new Set(PUZZLE.solution.join(''));
      const feedback   = computeFeedback(word, PUZZLE.solution[rowNum], allLetters);
      const FLIP_MS    = 500;
      const STAGGER_MS = 180;

      feedback.forEach((color, col) => {
        const cell = document.getElementById('r' + rowNum + 'c' + col);
        setTimeout(() => {
          cell.classList.add('flipping');
          setTimeout(() => cell.classList.add(color), FLIP_MS / 2);
          cell.addEventListener('animationend', () => cell.classList.remove('flipping'), { once: true });
        }, col * STAGGER_MS);
      });

      const totalMs = (feedback.length - 1) * STAGGER_MS + FLIP_MS;
      setTimeout(() => {
        updateKeyboardColors(feedback, word);
        if (onComplete) onComplete();
      }, totalMs + 50);
    }

    function updateKeyboardColors(feedback, word) {
      feedback.forEach((color, i) => {
        const letter = word[i];
        if (!letterStates[letter] || COLOR_RANK[color] > COLOR_RANK[letterStates[letter]]) {
          letterStates[letter] = color;
          const btn = document.querySelector('[data-key="' + letter + '"]');
          if (btn) { btn.classList.remove('green', 'yellow', 'gray'); btn.classList.add(color); }
        }
      });
    }

    function resetKeyboardColors() {
      Object.keys(letterStates).forEach(letter => {
        delete letterStates[letter];
        const btn = document.querySelector('[data-key="' + letter + '"]');
        if (btn) btn.classList.remove('green', 'yellow', 'gray');
      });
    }

    function showMessage(text) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.classList.add('visible');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => el.classList.remove('visible'), 1500);
    }

    function shakeRow(rowNum) {
      const el = document.getElementById('row-' + rowNum);
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    function updateGuessCounter() {
      const done = guessRowPtr >= PUZZLE.guessableRows.length || guessIndex >= MAX_GUESSES;
      document.getElementById('guess-counter').textContent =
        done ? '' : 'GUESS ' + (guessIndex + 1) + ' OF ' + MAX_GUESSES;
    }

    function checkGameEnd() {
      if (guessRowPtr >= PUZZLE.guessableRows.length) {
        // All rows solved — win
        gameOver = true;
        showResult(true);
        return;
      }
      if (guessIndex >= MAX_GUESSES) {
        // Out of guesses — reveal unsolved rows and lose
        PUZZLE.guessableRows.slice(guessRowPtr).forEach(rowNum => {
          [0,1,2,3].forEach(c => {
            const cell = document.getElementById('r' + rowNum + 'c' + c);
            cell.textContent = PUZZLE.solution[rowNum][c];
            cell.classList.remove('green', 'yellow', 'gray');
            cell.classList.add('reveal');
          });
        });
        gameOver = true;
        showResult(false);
      }
    }

    function showResult(won) {
      document.getElementById('guess-counter').hidden = true;
      const panel = document.getElementById('result');
      panel.hidden = false;
      panel.dataset.outcome = won ? 'win' : 'lose';
      document.getElementById('result-title').textContent = won
        ? ['Solved!', 'Perfect square!', 'Nailed it!'][guessIndex % 3]
        : 'Better luck at the next NOON';
      document.getElementById('result-sub').textContent = won
        ? 'Completed in ' + guessIndex + ' of ' + MAX_GUESSES + ' guesses'
        : 'Come back tomorrow at 12:00 PM ET';
    }

    function buildShareText() {
      const won = guessRowPtr >= PUZZLE.guessableRows.length;
      const header = 'NOON #' + PUZZLE_NUM + ' ' + (won ? guessIndex : 'X') + '/' + MAX_GUESSES;
      const rows = [];
      for (let r = 0; r < 4; r++) {
        if (r === PUZZLE.revealedRow) {
          rows.push('⬜⬜⬜⬜');  // freebie — white squares signal the gimme
        } else {
          rows.push([0,1,2,3].map(c => {
            const cl = document.getElementById('r' + r + 'c' + c).classList;
            if (cl.contains('green'))  return '🟩';
            if (cl.contains('yellow')) return '🟨';
            return '⬜';
          }).join(''));
        }
      }
      return header + '\n\n' + rows.join('\n');
    }

    document.getElementById('share-btn').addEventListener('click', () => {
      const text = buildShareText();
      const btn = document.getElementById('share-btn');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Share result'; }, 2000);
      }).catch(() => {
        showMessage('Copy not supported — share manually');
      });
    });

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      handleKey(e.key);
    });

    markActiveRow();  // highlight row 0 on load

    document.getElementById('clear-btn').addEventListener('click', () => {
      const row = activeRowNum();
      [0,1,2,3].forEach(c => {
        const cell = document.getElementById('r' + row + 'c' + c);
        if (!cell.classList.contains('green')) {
          cell.textContent = '';
          cell.classList.remove('yellow', 'gray');
        }
      });
      // Place cursor at first non-green cell
      currentCol = 0;
      while (currentCol < 4 && document.getElementById('r' + row + 'c' + currentCol).classList.contains('green')) currentCol++;
      document.getElementById('clear-btn').hidden = true;
      submitting = false;
    });

    document.getElementById('keyboard').addEventListener('click', e => {
      const key = e.target.closest('[data-key]');
      if (key) handleKey(key.dataset.key);
    });
  </script>

  <script>
    function updateCountdown() {
      const now = new Date();
      const etNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));

      const nextNoon = new Date(etNow);
      nextNoon.setHours(12, 0, 0, 0);
      if (etNow >= nextNoon) nextNoon.setDate(nextNoon.getDate() + 1);

      const diff = nextNoon - etNow;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      const timeStr =
        String(h).padStart(2, '0') + ':' +
        String(m).padStart(2, '0') + ':' +
        String(s).padStart(2, '0');

      document.querySelectorAll('.countdown-time').forEach(el => el.textContent = timeStr);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
